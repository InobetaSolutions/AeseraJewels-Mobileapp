name: Auto Merge PR
 
on:

  pull_request_review:

    types: [submitted]
 
jobs:

  automerge:

    if: github.event.review.state == 'approved'

    runs-on: ubuntu-latest
 
    steps:

      - name: Auto merge PR

        uses: pascalgn/automerge-action@v0.15.6

        env:

          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          MERGE_METHOD: squash
 
